<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MDI Gurgaon — Investment Decision Study</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ── Reset & Variables ─────────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:     #1B2A4A;
  --navy-mid: #243656;
  --amber:    #D4891A;
  --amber-lt: #FDF3DC;
  --white:    #FFFFFF;
  --off:      #F7F8FA;
  --slate:    #64748B;
  --light:    #E2E8F0;
  --dark:     #1E293B;
  --red:      #C0392B;
  --green:    #1A7A44;
  --mid:      #94A3B8;
  --radius:   10px;
  --shadow:   0 4px 24px rgba(27,42,74,0.10);
  --font-h:   'Libre Baskerville', Georgia, serif;
  --font-b:   'DM Sans', sans-serif;
}
html{scroll-behavior:smooth}
body{
  font-family:var(--font-b);
  background:var(--off);
  color:var(--dark);
  min-height:100vh;
  font-size:15px;
  line-height:1.6;
}

/* ── Layout ────────────────────────────────────────────────────────────── */
.shell{
  max-width:740px;
  margin:0 auto;
  padding:0 16px 60px;
}

/* ── Progress ──────────────────────────────────────────────────────────── */
.progress-wrap{
  position:sticky;top:0;z-index:100;
  background:var(--navy);
  padding:10px 20px;
  display:flex;align-items:center;gap:14px;
}
.progress-bar{flex:1;height:4px;background:rgba(255,255,255,0.2);border-radius:2px}
.progress-fill{height:100%;background:var(--amber);border-radius:2px;transition:width 0.5s ease}
.progress-label{font-size:12px;color:rgba(255,255,255,0.7);white-space:nowrap;font-family:var(--font-b)}

/* ── Cards ─────────────────────────────────────────────────────────────── */
.card{
  background:var(--white);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  padding:32px 36px;
  margin-top:28px;
  border:1px solid var(--light);
}
.card-header{
  display:flex;align-items:center;gap:12px;
  margin-bottom:22px;
  padding-bottom:16px;
  border-bottom:2px solid var(--amber);
}
.block-badge{
  background:var(--navy);
  color:var(--white);
  font-size:10px;font-weight:600;letter-spacing:0.08em;
  padding:4px 10px;border-radius:20px;
  white-space:nowrap;font-family:var(--font-b);text-transform:uppercase;
}
.card-title{
  font-family:var(--font-h);
  font-size:18px;color:var(--navy);
}

/* ── Section headings ──────────────────────────────────────────────────── */
.section-label{
  font-size:11px;font-weight:600;letter-spacing:0.07em;
  text-transform:uppercase;color:var(--amber);
  margin:24px 0 8px;font-family:var(--font-b);
}

/* ── Questions ─────────────────────────────────────────────────────────── */
.q-block{margin-bottom:24px}
.q-label{
  font-size:14.5px;font-weight:500;color:var(--dark);
  margin-bottom:10px;line-height:1.55;
}
.q-num{
  display:inline-block;
  background:var(--amber);color:var(--white);
  font-size:11px;font-weight:600;
  padding:2px 7px;border-radius:4px;
  margin-right:8px;vertical-align:middle;
  font-family:var(--font-b);
}
.q-note{
  font-size:12px;color:var(--slate);
  font-style:italic;margin-top:4px;
}

/* ── Text inputs ───────────────────────────────────────────────────────── */
input[type=text],input[type=number],select,textarea{
  width:100%;padding:10px 14px;
  border:1.5px solid var(--light);border-radius:8px;
  font-family:var(--font-b);font-size:14px;color:var(--dark);
  background:var(--white);
  transition:border-color 0.2s,box-shadow 0.2s;
  outline:none;
}
input[type=text]:focus,input[type=number]:focus,select:focus,textarea:focus{
  border-color:var(--amber);
  box-shadow:0 0 0 3px rgba(212,137,26,0.15);
}
input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}

/* ── Radio / Checkbox options ──────────────────────────────────────────── */
.options{display:flex;flex-direction:column;gap:8px;margin-top:8px}
.opt{
  display:flex;align-items:flex-start;gap:12px;
  padding:10px 14px;border-radius:8px;
  border:1.5px solid var(--light);cursor:pointer;
  transition:all 0.15s;font-size:14px;
  background:var(--white);
}
.opt:hover{border-color:var(--amber);background:var(--amber-lt)}
.opt.selected{border-color:var(--amber);background:var(--amber-lt)}
.opt input{margin-top:2px;flex-shrink:0;accent-color:var(--amber)}
.opt-text{line-height:1.4;color:var(--dark)}

/* ── Matrix table ──────────────────────────────────────────────────────── */
.matrix-wrap{overflow-x:auto;margin-top:8px}
.matrix{width:100%;border-collapse:collapse;font-size:13px}
.matrix th{
  background:var(--navy);color:var(--white);
  padding:8px 6px;text-align:center;font-weight:600;font-size:12px;
  border:1px solid var(--navy-mid);
}
.matrix th.stmt-col{text-align:left;width:45%}
.matrix td{
  padding:9px 6px;border:1px solid var(--light);
  text-align:center;vertical-align:middle;
}
.matrix td.stmt{text-align:left;padding-left:10px;font-size:13px;line-height:1.4}
.matrix tr:nth-child(even) td{background:var(--off)}
.matrix tr:hover td{background:rgba(212,137,26,0.06)}
.matrix td input[type=radio]{accent-color:var(--amber);width:16px;height:16px;cursor:pointer}
.rev-tag{font-size:10px;color:var(--red);margin-left:4px;font-style:italic}

/* ── Allocation inputs ─────────────────────────────────────────────────── */
.alloc-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px}
.alloc-item{
  background:var(--off);border:1.5px solid var(--light);
  border-radius:8px;padding:12px 14px;
}
.alloc-asset-name{font-weight:600;font-size:13.5px;color:var(--navy);margin-bottom:2px}
.alloc-asset-sub{font-size:11.5px;color:var(--slate);margin-bottom:8px}
.alloc-item input{margin-top:0}
.alloc-total{
  margin-top:12px;padding:12px 16px;
  border-radius:8px;background:var(--off);
  border:1.5px solid var(--light);
  display:flex;justify-content:space-between;align-items:center;
  font-size:14px;font-weight:500;
}
.alloc-total-val{font-size:16px;font-weight:700}
.alloc-ok{color:var(--green)}
.alloc-err{color:var(--red)}

/* ── HL / LA table ─────────────────────────────────────────────────────── */
.task-table{width:100%;border-collapse:collapse;font-size:13px;margin-top:12px}
.task-table th{
  background:var(--navy);color:var(--white);
  padding:9px 10px;font-size:12px;font-weight:600;border:1px solid var(--navy-mid);
}
.task-table td{
  padding:9px 10px;border:1px solid var(--light);
  vertical-align:middle;text-align:center;
}
.task-table tr:nth-child(even) td{background:var(--off)}
.task-table td.row-label{font-weight:600;color:var(--navy);width:50px}
.task-table td.prob{color:var(--slate);font-size:12.5px}
.task-table td input[type=radio]{accent-color:var(--amber);width:16px;height:16px;cursor:pointer}

/* ── Slider ────────────────────────────────────────────────────────────── */
.slider-wrap{margin-top:12px}
.slider-val-display{
  font-size:32px;font-weight:700;color:var(--navy);
  font-family:var(--font-h);margin-bottom:8px;
}
.slider-val-display span{font-size:16px;font-weight:400;color:var(--slate)}
input[type=range]{
  width:100%;height:6px;
  -webkit-appearance:none;appearance:none;
  background:var(--light);border-radius:3px;cursor:pointer;
  accent-color:var(--amber);
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;appearance:none;
  width:22px;height:22px;border-radius:50%;
  background:var(--amber);cursor:pointer;
  box-shadow:0 2px 8px rgba(212,137,26,0.4);
}
.slider-ends{display:flex;justify-content:space-between;font-size:11.5px;color:var(--slate);margin-top:6px}

/* ── Info boxes ────────────────────────────────────────────────────────── */
.info-box{
  background:var(--off);border-left:4px solid var(--navy);
  border-radius:0 8px 8px 0;padding:12px 16px;
  margin:12px 0;font-size:13.5px;color:var(--dark);line-height:1.6;
}
.warn-box{
  background:var(--amber-lt);border-left:4px solid var(--amber);
  border-radius:0 8px 8px 0;padding:12px 16px;
  margin:12px 0;font-size:13.5px;color:var(--dark);line-height:1.6;
}
.error-box{
  background:#fdf0ef;border-left:4px solid var(--red);
  border-radius:0 8px 8px 0;padding:12px 16px;
  margin:12px 0;font-size:13.5px;color:var(--red);
  font-weight:500;display:none;
}

/* ── Asset / Instruction table ─────────────────────────────────────────── */
.inst-table{width:100%;border-collapse:collapse;font-size:13px;margin:12px 0}
.inst-table th{background:var(--navy);color:var(--white);padding:8px 10px;font-size:12px;border:1px solid var(--navy-mid)}
.inst-table td{padding:8px 10px;border:1px solid var(--light);vertical-align:middle}
.inst-table tr:nth-child(even) td{background:var(--off)}

/* ── Peer card ─────────────────────────────────────────────────────────── */
.peer-card{
  background:var(--off);border:1.5px solid var(--light);
  border-radius:10px;padding:14px 18px;
  display:flex;align-items:center;gap:14px;margin-bottom:16px;
}
.peer-avatar{
  width:44px;height:44px;border-radius:50%;
  background:var(--navy);color:var(--amber);
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:15px;font-family:var(--font-h);flex-shrink:0;
}
.peer-info{font-size:13px}
.peer-name{font-weight:600;color:var(--navy)}
.peer-sub{color:var(--slate);font-size:12px}

/* ── Treatment boxes ───────────────────────────────────────────────────── */
.treatment-box{
  border-radius:10px;padding:16px 20px;margin-bottom:14px;
  border:1.5px solid var(--light);
}
.treatment-box.luck{background:#FFF9E6;border-color:#E8A020}
.treatment-box.skill{background:#EBF5FF;border-color:#2E75B6}
.treatment-box.control{background:var(--off);border-color:var(--light)}
.treatment-label{
  font-size:11px;font-weight:700;letter-spacing:0.06em;
  text-transform:uppercase;margin-bottom:6px;font-family:var(--font-b);
}
.treatment-box.luck .treatment-label{color:#7A5200}
.treatment-box.skill .treatment-label{color:#0C447C}
.treatment-box.control .treatment-label{color:var(--slate)}
.gap-note{
  background:rgba(212,137,26,0.12);border-radius:6px;
  padding:10px 14px;margin-top:10px;
  font-size:13.5px;font-weight:500;color:var(--dark);
}

/* ── Returns display ───────────────────────────────────────────────────── */
.returns-grid{display:grid;gap:16px;margin-top:12px}
.return-card{
  border:1.5px solid var(--light);border-radius:10px;overflow:hidden;
}
.return-card-header{
  background:var(--navy);color:var(--white);
  padding:10px 16px;display:flex;justify-content:space-between;align-items:center;
  font-size:13px;font-weight:600;
}
.return-pay-badge{
  background:var(--amber);color:var(--navy);
  font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;
}
.return-body{padding:12px 16px}
.return-assets{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:12px}
.return-asset{
  background:var(--off);border-radius:6px;padding:8px 6px;text-align:center;
  border:1px solid var(--light);
}
.return-asset-name{font-size:11px;font-weight:600;color:var(--navy)}
.return-asset-alloc{font-size:12px;color:var(--slate)}
.return-asset-ret{font-size:13px;font-weight:700}
.ret-pos{color:var(--green)}
.ret-neg{color:var(--red)}
.ret-zero{color:var(--slate)}
.return-summary{
  display:flex;justify-content:space-between;align-items:center;
  padding:10px 14px;border-radius:8px;background:var(--off);
  border:1.5px solid var(--light);font-size:14px;
}
.return-total{font-size:18px;font-weight:700;font-family:var(--font-h)}

/* ── Navigation ────────────────────────────────────────────────────────── */
.nav-row{
  display:flex;justify-content:space-between;align-items:center;
  margin-top:28px;padding-top:20px;
  border-top:1.5px solid var(--light);
}
.btn{
  padding:11px 26px;border-radius:8px;font-size:14px;font-weight:600;
  cursor:pointer;border:1.5px solid;transition:all 0.2s;
  font-family:var(--font-b);
}
.btn-secondary{
  border-color:var(--light);background:var(--white);color:var(--slate);
}
.btn-secondary:hover{background:var(--off);border-color:var(--slate)}
.btn-primary{
  border-color:var(--amber);background:var(--amber);color:var(--white);
}
.btn-primary:hover{background:#b8750f;border-color:#b8750f}
.btn-primary:disabled{opacity:0.5;cursor:not-allowed}

/* ── Cover / Thank you ─────────────────────────────────────────────────── */
.cover{
  min-height:100vh;background:var(--navy);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:40px 24px;text-align:center;
}
.cover-logo{
  font-family:var(--font-h);font-size:13px;
  color:var(--amber);letter-spacing:0.1em;text-transform:uppercase;
  margin-bottom:40px;
}
.cover-title{
  font-family:var(--font-h);font-size:clamp(22px,4vw,34px);
  color:var(--white);line-height:1.3;margin-bottom:12px;max-width:560px;
}
.cover-sub{font-size:15px;color:rgba(255,255,255,0.65);margin-bottom:36px;max-width:480px;line-height:1.6}
.cover-meta{
  display:grid;grid-template-columns:1fr 1fr;gap:12px;
  max-width:460px;width:100%;margin-bottom:36px;
}
.meta-item{
  background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);
  border-radius:8px;padding:12px 16px;text-align:left;
}
.meta-label{font-size:10px;color:var(--amber);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:2px}
.meta-value{font-size:13px;color:var(--white)}

/* ── Comprehension feedback ────────────────────────────────────────────── */
.comp-explanation{
  background:#fdf0ef;border-left:4px solid var(--red);
  border-radius:0 8px 8px 0;padding:12px 16px;
  margin-top:10px;font-size:13.5px;color:var(--dark);display:none;
}
.comp-correct{
  background:#eaf3de;border-left:4px solid var(--green);
  border-radius:0 8px 8px 0;padding:12px 16px;
  margin-top:10px;font-size:13.5px;color:var(--green);display:none;
}

/* ── Loading overlay ───────────────────────────────────────────────────── */
.loading{
  position:fixed;inset:0;background:rgba(27,42,74,0.75);
  display:flex;align-items:center;justify-content:center;
  z-index:9999;display:none;
}
.loading-inner{
  background:var(--white);border-radius:12px;padding:32px 40px;
  text-align:center;font-family:var(--font-b);
}
.spinner{
  width:40px;height:40px;border:3px solid var(--light);
  border-top-color:var(--amber);border-radius:50%;
  animation:spin 0.8s linear infinite;margin:0 auto 14px;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Responsive ────────────────────────────────────────────────────────── */
@media(max-width:600px){
  .card{padding:20px 18px}
  .alloc-grid{grid-template-columns:1fr}
  .cover-meta{grid-template-columns:1fr}
  .return-assets{grid-template-columns:repeat(3,1fr)}
}
</style>
</head>
<body>

<div class="loading" id="loading">
  <div class="loading-inner">
    <div class="spinner"></div>
    <div style="font-size:14px;color:var(--slate)">Saving your response…</div>
  </div>
</div>

<!-- All sections hidden by default; JS shows one at a time -->
<div id="app"></div>

<script>
// ═══════════════════════════════════════════════════════════════════════════
// CONFIGURATION — edit these before deploying
// ═══════════════════════════════════════════════════════════════════════════
const CONFIG = {
  // Google Apps Script Web App URL — replace with your deployment URL
  SCRIPT_URL: "https://script.google.com/macros/s/AKfycbyoB32_8ysHUrPXHCEnF1uRr-RHDc5fEFnzv082DqJnBCHwJnt4c61NLW7zsaV6CVpIZw/exec",
  STUDY_TITLE: "Investment Decision Study",
  PI: "Dr Puneet Arora",
  INSTITUTION: "Management Development Institute Gurgaon",
  CONTACT: "puneet.arora@mdi.ac.in",
};

// ═══════════════════════════════════════════════════════════════════════════
// ASSET PARAMETERS
// ═══════════════════════════════════════════════════════════════════════════
const ASSETS = {
  cash: { label:"Cash",    mean:0,  sd:0,   desc:"Guaranteed 0% return",                   ret:"0%",    risk:"None"    },
  L:    { label:"Asset L", mean:5,  sd:2.5, desc:"Govt. bonds / short-duration debt funds", ret:"~5%",   risk:"±2.5%"  },
  M:    { label:"Asset M", mean:10, sd:7,   desc:"Large-cap equity index funds",            ret:"~10%",  risk:"±7%"    },
  H:    { label:"Asset H", mean:17, sd:14,  desc:"Small-cap equity",                        ret:"~17%",  risk:"±14%"   },
  V:    { label:"Asset V", mean:25, sd:28,  desc:"Derivatives / speculative products",      ret:"~25%",  risk:"±28%"   },
};
const ENDOWMENT   = 10000;
const PEER_RETURN = 40;

// ═══════════════════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════════════════
const state = {
  section:       "cover",
  condition:     null,          // Control | Luck | Skill | LuckReflect
  conditionNum:  null,
  compAttempts:  0,
  compQuestion:  1,             // 1,2,3
  currentRound:  1,
  payRound:      null,
  answers:       {},
  allocs:        { R1:{cash:0,L:0,M:0,H:0,V:0}, R2:{cash:0,L:0,M:0,H:0,V:0}, R3:{cash:0,L:0,M:0,H:0,V:0} },
  returns:       {},
  pid:           null,          // unique participant ID
};

// ═══════════════════════════════════════════════════════════════════════════
// UTILITIES
// ═══════════════════════════════════════════════════════════════════════════
function uid(){ return "P_" + Date.now() + "_" + Math.random().toString(36).slice(2,7).toUpperCase(); }

function randNormal(mean, sd){
  if(sd === 0) return mean;
  let u1=0, u2=0;
  while(u1===0) u1=Math.random();
  while(u2===0) u2=Math.random();
  return mean + sd * Math.sqrt(-2*Math.log(u1)) * Math.cos(2*Math.PI*u2);
}

function calcReturn(alloc){
  const total = Object.values(alloc).reduce((a,b)=>a+b,0) || ENDOWMENT;
  let portfolio = 0;
  const breakdown = {};
  for(const [key, asset] of Object.entries(ASSETS)){
    const weight = (alloc[key]||0) / total;
    const draw   = randNormal(asset.mean, asset.sd);
    breakdown[key] = { weight, draw, amt: alloc[key]||0 };
    portfolio += weight * draw;
  }
  return { portfolio, breakdown };
}

function fmt(n){ return (n>=0?"+":"")+n.toFixed(1)+"%" }
function fmtINR(n){ return "₹"+Math.round(n).toLocaleString("en-IN") }

function randomCondition(){
  const arms = ["Control","Luck","Skill","LuckReflect"];
  const idx  = Math.floor(Math.random()*4);
  state.condition    = arms[idx];
  state.conditionNum = idx+1;
}

function randomPayRound(){
  state.payRound = Math.floor(Math.random()*3)+1;
}

function show(id){
  document.querySelectorAll(".section").forEach(s=>s.style.display="none");
  const el = document.getElementById(id);
  if(el){ el.style.display="block"; window.scrollTo({top:0,behavior:"smooth"}); }
}

function progress(pct){
  document.querySelector(".progress-fill").style.width = pct+"%";
  document.querySelector(".progress-label").textContent = Math.round(pct)+"% complete";
}

function getChecked(name){
  const el = document.querySelector(`input[name="${name}"]:checked`);
  return el ? el.value : null;
}

function getAlloc(round){
  const keys = ["cash","L","M","H","V"];
  const alloc = {};
  keys.forEach(k => {
    const el = document.getElementById(`${round}_${k}`);
    alloc[k] = el ? (parseFloat(el.value)||0) : 0;
  });
  return alloc;
}

function allocTotal(alloc){
  return Object.values(alloc).reduce((a,b)=>a+b,0);
}

function updateAllocTotal(round){
  const alloc = getAlloc(round);
  const total = allocTotal(alloc);
  const el    = document.getElementById(`total_${round}`);
  const ok    = total === ENDOWMENT;
  el.innerHTML = `Total: <span class="alloc-total-val ${ok?"alloc-ok":"alloc-err"}">${fmtINR(total)} / ${fmtINR(ENDOWMENT)}</span> ${ok?"✓":"— must equal ₹10,000"}`;
  return ok;
}

// ═══════════════════════════════════════════════════════════════════════════
// DATA SUBMISSION
// ═══════════════════════════════════════════════════════════════════════════
async function saveData(payload) {
  // ✅ CORRECT — blocks only when the placeholder is still present
if (!CONFIG.SCRIPT_URL || CONFIG.SCRIPT_URL.includes("YOUR_SCRIPT_ID")) {
    console.warn("No Google Script URL configured — data not saved");
    return;
}
  document.getElementById("loading").style.display = "flex";
  try {
    const params = new URLSearchParams({ data: JSON.stringify(payload) });
    await fetch(CONFIG.SCRIPT_URL, {
      method: "POST",
      mode: "no-cors",
      body: params,
    });
  } catch(e) {
  console.error("Save error:", e);
  alert("⚠️ Your response could not be saved. Please check your connection and try again.");
}
  finally { document.getElementById("loading").style.display = "none"; }
}

async function saveBlock(blockName, data){
  await saveData({
    pid:         state.pid,
    timestamp:   new Date().toISOString(),
    condition:   state.condition,
    conditionNum:state.conditionNum,
    block:       blockName,
    payRound:    state.payRound,
    ...data
  });
}

function textQ(qnum, label, id, type="text", placeholder=""){
  return `<div class="q-block">
    <div class="q-label"><span class="q-num">${qnum}</span>${label}</div>
    <input type="${type}" id="${id}" placeholder="${placeholder}">
  </div>`;

function radioOpts(name, opts){
  return `<div class="options">
    ${opts.map(([v,l])=>`<label class="opt" onclick="selectOpt(this,'${name}','${v}')"><input type="radio" name="${name}" value="${v}"><span class="opt-text">${l}</span></label>`).join("")}
  </div>`;
}

function allocBlock(round){
  const assets = Object.entries(ASSETS);
  const grid   = assets.map(([k,a])=>`
    <div class="alloc-item">
      <div class="alloc-asset-name">${a.label}</div>
      <div class="alloc-asset-sub">${a.ret} expected · ${a.risk} risk</div>
      <input type="number" id="${round}_${k}" min="0" max="10000" step="100" placeholder="0"
        oninput="updateAllocTotal('${round}')">
    </div>`).join("");
  return `
    <div class="alloc-grid">${grid}</div>
    <div class="alloc-total" id="total_${round}">
      Total: <span class="alloc-total-val alloc-err">₹0 / ₹10,000</span>
    </div>`;
}

function selectOpt(el, name, val){
  document.querySelectorAll(`input[name="${name}"]`).forEach(i=>{
    i.closest(".opt")?.classList.remove("selected");
  });
  el.classList.add("selected");
  el.querySelector("input").checked = true;
}

  const cq    = compQs[state.compQuestion-1];
  if(!ans){ document.getElementById("err-comp").style.display="block"; return; }
  document.getElementById("err-comp").style.display="none";

    bfi_neuroticism:      ((6-parseInt(bfi[3]))+parseInt(bfi[8]))/2,
    bfi_openness:         ((6-parseInt(bfi[4]))+parseInt(bfi[9]))/2,
    sco_mean:             (sco.map((v,i)=>[4,10].includes(i)?6-parseInt(v):parseInt(v)).reduce((a,b)=>a+b,0)/11).toFixed(3),
  };
  state.answers.block10 = d;
  saveBlock("B10_Personality", d);
  randomPayRound();
  goSection("block11");
}

function toggleGoal(idx, el){
  const checked = document.querySelectorAll("#ref-goals input:checked").length;
  const cb = document.getElementById(`ref_${idx}`);
  if(cb.checked){ cb.checked=false; el.classList.remove("selected"); }
  else if(checked < 2){ cb.checked=true; el.classList.add("selected"); }
}

// ═══════════════════════════════════════════════════════════════════════════
// ATTACH HANDLERS (called after each render)
// ═══════════════════════════════════════════════════════════════════════════
function attachHandlers(sec){
  // Show/hide CAT/GMAT blocks
  if(sec==="block1"){
    document.querySelectorAll("input[name='b1_exam']").forEach(el=>{
      el.addEventListener("change",()=>{
        document.getElementById("cat-block").style.display = el.value==="1"?"block":"none";
        document.getElementById("gmat-block").style.display = el.value==="2"?"block":"none";
      });
    });
  }
  // Alloc live update
  if(["block6","block7","block9"].includes(sec)){
    const rMap = {block6:"R1",block7:"R2",block9:"R3"};
    const round = rMap[sec];
    document.querySelectorAll(`input[id^='${round}_']`).forEach(el=>{
      el.addEventListener("input",()=>updateAllocTotal(round));
    });
  }
  if(sec==="block3"){
    document.querySelectorAll("input[id^='prac_']").forEach(el=>{
      el.addEventListener("input",()=>updateAllocTotal("prac"));
    });
  }
  // Block 11 — save results
  if(sec==="block11"){
    const returns = state.returns || [];
    const savePayload = {
      pay_round: state.payRound,
      r1_portfolio: returns[0]?.portfolio?.toFixed(2),
      r2_portfolio: returns[1]?.portfolio?.toFixed(2),
      r3_portfolio: returns[2]?.portfolio?.toFixed(2),
    };
    saveBlock("B11_Returns", savePayload);
  }
}

// ═══════════════════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════════════════
render();
</script>
